# CI principal — Jest no backend (obrigatório em push/PR).
#
# Job required: backend-tests (MySQL service container + Prisma migrate + Jest).
# E2E Playwright NÃO roda aqui — veja .github/workflows/e2e.yml (disparo manual).
#
# Local (PowerShell):
#   $env:DATABASE_URL = "mysql://ci:ci@127.0.0.1:3306/ci"
#   $env:SESSION_SECRET = "ci-test-session-secret"
#   $env:NODE_ENV = "test"
#   npm ci
#   npx prisma migrate deploy -w backend
#   npm test -w backend

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (Jest)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci
          MYSQL_USER: ci
          MYSQL_PASSWORD: ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci

      - name: Run Jest
        run: npm test -w backend
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          SESSION_SECRET: ci-test-session-secret
